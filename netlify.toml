# Build command/publish directory/env vars like NEXT_PUBLIC_SUPABASE_* stay
# configured in the Netlify UI (this file doesn't declare them, so the UI
# settings keep taking effect as before).
#
# LD_LIBRARY_PATH here is load-bearing, not a preference: onnxruntime-node's
# native addon needs its sibling libonnxruntime.so.1 at a location outside
# the deployed function bundle (see src/lib/ocr/engines/paddle.ts for why --
# short version, the raw file is too big to ship in the 50MB-zipped Lambda
# package, so a compressed copy is decompressed into /tmp on cold start
# instead). The dynamic linker only checks LD_LIBRARY_PATH directories that
# were present when the process *started* -- setting it from Node code after
# boot has no effect -- so it has to be a real Lambda environment variable,
# set before the function's process exists. This is the only way to get one
# in without dashboard access.
[build.environment]
  LD_LIBRARY_PATH = "/tmp/onnxruntime-lib"
